<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNMP - Tri-Engine Pro</title>
    <style>
        body { 
            background-color: #0f0f13; color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 20px 0; min-height: 100vh;
        }
        .player-container { 
            background: #1a1a24; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 191, 255, 0.15); 
            width: 90%; max-width: 350px; text-align: center; 
            border: 1px solid #2d2d3d; margin-bottom: 20px;
        }
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input {
            flex: 1; padding: 10px; border-radius: 10px; border: none;
            background: #2d2d3d; color: white; outline: none;
        }
        .search-box button {
            padding: 10px 15px; border-radius: 10px; border: none;
            background: #00bfff; color: white; font-weight: bold; cursor: pointer;
        }
        
        /* 3 TABS CSS */
        .tabs { display: flex; width: 100%; background: #2d2d3d; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px 5px; text-align: center; cursor: pointer; font-size: 0.8em; font-weight: bold; color: #8888a0; transition: 0.3s; }
        .tab.active { background: #00bfff; color: white; }

        .album-art { 
            width: 100%; height: 250px; background: #252535; 
            border-radius: 15px; margin-bottom: 15px; object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .song-title { font-size: 1.2em; font-weight: bold; color: #00bfff; margin-bottom: 5px; }
        .artist-name { font-size: 0.9em; color: #8888a0; margin-bottom: 15px; }
        
        .progress-container { display: flex; align-items: center; gap: 10px; font-size: 0.8em; color: #8888a0; margin-bottom: 15px; }
        input[type="range"] { 
            flex: 1; accent-color: #00bfff; height: 4px; background: #333; 
            border-radius: 5px; outline: none; cursor: pointer;
        }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .controls button { 
            background: none; border: none; color: #00bfff; 
            font-size: 25px; cursor: pointer; transition: 0.2s;
        }
        #playBtn { font-size: 45px; }
        .controls button:active { transform: scale(0.9); color: white; }

        /* LISTS CSS */
        .list-container { display: none; width: 90%; max-width: 350px; text-align: left; }
        .list-container.active { display: block; }
        
        .result-item {
            background: #1a1a24; padding: 10px; border-radius: 10px; 
            margin-bottom: 10px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; border: 1px solid #2d2d3d; transition: 0.2s;
        }
        .result-item:hover { background: #252535; border-color: #00bfff; }
        .result-thumb { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .result-info { display: flex; flex-direction: column; overflow: hidden; }
        .result-title { font-size: 0.9em; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white;}
        .result-artist { font-size: 0.75em; color: #8888a0; }
        .source-badge { font-size: 0.6em; background: #333; padding: 2px 5px; border-radius: 3px; width: max-content; margin-top: 3px;}
    </style>
</head>
<body>

    <div class="player-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search a song or BGM...">
            <button onclick="searchAll()">Search</button>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-saavn" onclick="switchTab('saavn')">🎵 Saavn</div>
            <div class="tab" id="tab-ytm" onclick="switchTab('ytm')">🎧 YT Music</div>
            <div class="tab" id="tab-yt" onclick="switchTab('yt')">🎥 YT Video</div>
        </div>

        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=600&auto=format&fit=crop" alt="Album Cover" class="album-art" id="cover">
        
        <div class="song-title" id="title">CNMP Tri-Engine</div>
        <div class="artist-name" id="artist">3 Platforms in 1 App!</div>
        
        <audio id="audio"></audio>

        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressBar" value="0" max="100">
            <span id="totalTime">0:00</span>
        </div>

        <div class="controls">
            <button onclick="toggleLoop()" id="loopBtn" style="color: gray;">🔁</button>
            <button onclick="togglePlay()" id="playBtn">▶️</button>
            <button onclick="downloadSong()" id="downBtn">⬇️</button>
        </div>
        <p id="statusMessage" style="color: #00bfff; font-size: 0.8em; margin-top: 10px;"></p>
    </div>

    <div class="list-container active" id="list-saavn"></div>
    <div class="list-container" id="list-ytm"></div>
    <div class="list-container" id="list-yt"></div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const loopBtn = document.getElementById('loopBtn');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const cover = document.getElementById('cover');
        const statusMsg = document.getElementById('statusMessage');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');

        // Tab Switching Logic
        function switchTab(platform) {
            ['saavn', 'ytm', 'yt'].forEach(p => {
                document.getElementById(`tab-${p}`).className = platform === p ? 'tab active' : 'tab';
                document.getElementById(`list-${p}`).className = platform === p ? 'list-container active' : 'list-container';
            });
        }

        const SAAVN_API = "https://saavn.dev/api/search/songs?query=";
        const YT_SERVERS = [
            "https://pipedapi.kavin.rocks",
            "https://api.piped.projectsegfau.lt",
            "https://pipedapi.tokhmi.xyz"
        ];
        let currentYtServer = YT_SERVERS[0];

        function decodeHTML(html) {
            const txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        }

        // Master Search: Fires all 3 engines!
        function searchAll() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;

            statusMsg.innerText = "Firing Tri-Engines... 🚀";
            
            // Trigger 3 simultaneous searches
            fetchSaavn(query);
            fetchFromPiped(query, 'music_songs', 'list-ytm', '🎧 YT Music', '#ff0055');
            fetchFromPiped(query, 'videos', 'list-yt', '🎥 YouTube', '#ff4d4d');
        }

        // Engine 1: JioSaavn (HQ Original Music)
        async function fetchSaavn(query) {
            const container = document.getElementById('list-saavn');
            container.innerHTML = "<p style='text-align:center;'>Fetching HQ Music...</p>";
            try {
                const response = await fetch(SAAVN_API + encodeURIComponent(query));
                const json = await response.json();
                const songs = json.data.results;
                container.innerHTML = "";

                if (songs && songs.length > 0) {
                    songs.forEach(song => {
                        let songTitle = decodeHTML(song.name || "Unknown");
                        let songArtist = decodeHTML(song.primaryArtists || "Unknown Artist");
                        let songThumb = song.image ? (song.image[song.image.length - 1].link || song.image[song.image.length - 1].url) : "https://via.placeholder.com/50";
                        let audioUrl = song.downloadUrl ? (song.downloadUrl[song.downloadUrl.length - 1].link || song.downloadUrl[song.downloadUrl.length - 1].url) : "";

                        if (!audioUrl) return;

                        const item = document.createElement('div');
                        item.className = 'result-item';
                        item.onclick = () => playSaavn(audioUrl, songTitle, songArtist, songThumb);
                        item.innerHTML = `
                            <img src="${songThumb}" class="result-thumb">
                            <div class="result-info">
                                <span class="result-title">${songTitle}</span>
                                <span class="result-artist">${songArtist}</span>
                                <span class="source-badge" style="color:#00ff88;">🎵 Saavn 320kbps</span>
                            </div>
                        `;
                        container.appendChild(item);
                    });
                    statusMsg.innerText = "Results arrived! Select a tab.";
                } else {
                    container.innerHTML = "<p style='color:#ff4d4d; text-align:center;'>No Saavn results.</p>";
                }
            } catch (err) {
                container.innerHTML = "<p style='color:#ff4d4d; text-align:center;'>Saavn Engine Failed.</p>";
            }
        }

        // Engine 2 & 3: YouTube Music & YouTube Videos (Racing Load Balancer)
        async function fetchFromPiped(query, filter, containerId, badgeText, badgeColor) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<p style='text-align:center;'>Fetching ${badgeText}...</p>`;
            
            const fetchPromises = YT_SERVERS.map(async (server) => {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000); // 4 sec timeout
                try {
                    const response = await fetch(`${server}/search?q=${encodeURIComponent(query)}&filter=${filter}`, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error("Blocked");
                    const data = await response.json();
                    const streams = data.items.filter(item => item.type === 'stream').slice(0, 10);
                    if (streams.length === 0) throw new Error("Empty");
                    return { server, streams };
                } catch (error) { throw error; }
            });

            try {
                const fastest = await Promise.any(fetchPromises);
                currentYtServer = fastest.server; // Save fastest server for streaming
                container.innerHTML = "";

                fastest.streams.forEach(song => {
                    const vid = song.url.split('?v=')[1]; 
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.onclick = () => playYouTube(vid, song.title, song.uploaderName, song.thumbnail);
                    item.innerHTML = `
                        <img src="${song.thumbnail || 'https://via.placeholder.com/50'}" class="result-thumb">
                        <div class="result-info">
                            <span class="result-title">${song.title}</span>
                            <span class="result-artist">${song.uploaderName}</span>
                            <span class="source-badge" style="color:${badgeColor};">${badgeText}</span>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                container.innerHTML = `<p style='color:#ff4d4d; text-align:center;'>${badgeText} Servers Blocked Currently.</p>`;
            }
        }

        // Player Logic: Saavn (Instant Link)
        function playSaavn(audioUrl, songTitle, songArtist, songThumb) {
            updatePlayerUI(songTitle, songArtist, songThumb, "Playing HQ Audio... 🎵");
            audio.src = audioUrl;
            startAudio();
        }

        // Player Logic: YouTube (Requires Extraction)
        async function playYouTube(vid, songTitle, songArtist, songThumb) {
            updatePlayerUI(songTitle, songArtist, songThumb, "Extracting YouTube Audio... 🎧");
            try {
                const response = await fetch(`${currentYtServer}/streams/${vid}`);
                const data = await response.json();
                if (data.audioStreams && data.audioStreams.length > 0) {
                    const bestAudio = data.audioStreams.find(a => a.format === 'M4A') || data.audioStreams[0];
                    audio.src = bestAudio.url;
                    statusMsg.innerText = "Playing YouTube Stream...";
                    startAudio();
                } else {
                    statusMsg.innerText = "Stream extraction failed.";
                }
            } catch (err) {
                statusMsg.innerText = "Error playing YouTube audio.";
            }
        }

        function updatePlayerUI(songTitle, songArtist, songThumb, msg) {
            title.innerText = songTitle;
            artist.innerText = songArtist;
            cover.src = songThumb;
            statusMsg.innerText = msg;
            
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: songTitle, artist: songArtist,
                    artwork: [{ src: songThumb, sizes: '512x512', type: 'image/jpeg' }]
                });
                navigator.mediaSession.setActionHandler('play', () => { audio.play(); playBtn.innerText = "⏸"; });
                navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); playBtn.innerText = "▶️"; });
            }
        }

        function startAudio() {
            audio.play().then(() => { playBtn.innerText = "⏸"; })
            .catch(() => { playBtn.innerText = "▶️"; statusMsg.innerText = "Ready! Tap Play."; });
        }

        function togglePlay() {
            if (!audio.src) return; 
            if (audio.paused) { audio.play(); playBtn.innerText = "⏸"; } 
            else { audio.pause(); playBtn.innerText = "▶️"; }
        }

        function toggleLoop() {
            audio.loop = !audio.loop;
            loopBtn.style.color = audio.loop ? "#00ff00" : "gray";
            statusMsg.innerText = audio.loop ? "Loop Enabled" : "Loop Disabled";
        }

        function downloadSong() {
            if (!audio.src) return statusMsg.innerText = "Play a song first!";
            window.open(audio.src, '_blank');
        }

        function formatTime(seconds) {
            if(isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressBar.value = (audio.currentTime / audio.duration) * 100;
                currentTimeEl.innerText = formatTime(audio.currentTime);
                totalTimeEl.innerText = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('input', () => {
            if (audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration;
        });

        audio.addEventListener('ended', () => {
            if (!audio.loop) playBtn.innerText = "▶️";
        });
    </script>
</body>
</html>
